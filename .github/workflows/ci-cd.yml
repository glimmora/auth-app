name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0

jobs:
  lint:
    name: Lint and Auto-Fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      
      - name: Run Kotlin auto-fix
        run: |
          ktlint --format android/app/src/main/java/com/authvault/authapp/**/*.kt || true
      
      - name: Set up Clang-Format
        run: sudo apt-get install -y clang-format
      
      - name: Run C++ auto-fix
        run: |
          clang-format -i desktop/src/*.cpp desktop/src/*.h desktop/tests/*.cpp
      
      - name: Commit auto-fixes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-fix linting issues"
          git push
        continue-on-error: true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;${{ env.ANDROID_BUILD_TOOLS }} platforms;android-${{ env.ANDROID_COMPILE_SDK }}'
      
      - name: Grant execute permission
        run: chmod +x build_android.sh
      
      - name: Build APK
        run: ./build_android.sh
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/apk/release/*.apk
          retention-days: 30

  build-desktop:
    name: Build Desktop
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev
      
      - name: Grant execute permission
        run: chmod +x build_desktop.sh
      
      - name: Build Desktop
        run: ./build_desktop.sh
      
      - name: Upload Desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-binaries
          path: desktop/build/linux/authvault
          retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-desktop
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev
      
      - name: Build and run tests
        run: |
          cd desktop/tests
          mkdir -p build && cd build
          cmake ..
          make
          ./authvault_tests

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop, test]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: releases/android/
      
      - name: Download Desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-binaries
          path: releases/desktop/
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            releases/android/*.apk
            releases/desktop/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
