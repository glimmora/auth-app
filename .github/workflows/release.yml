name: AuthVault Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd web && npm ci
      - run: cd web && npx vitest run
      - run: cd web && npx tsc --noEmit

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > flutter/android/keystore/release.jks
          echo "${{ secrets.KEY_PROPERTIES_B64 }}" | base64 -d > flutter/android/key.properties
      - name: Build Android APKs (ABI split, signed)
        run: cd flutter && flutter build apk --release --split-per-abi --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            flutter/build/app/outputs/flutter-apk/*.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: cd flutter && flutter pub get
      - run: cd flutter && flutter create . --platforms web
      - run: cd flutter && flutter build web --no-wasm-dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: flutter/build/web/
